config:
  runTime: ".NET"
  version: "8"
  installCommand: "dotnet restore src/NameDemo.Web/NameDemo.Web.csproj"
  buildCommand: "dotnet publish src/NameDemo.Web/NameDemo.Web.csproj -c Release -o ./publish-web"
  runCommand: "cd ./publish-web && dotnet NameDemo.Web.dll"
  buildDir: "./publish-web"
  env:
    - key: ASPNETCORE_URLS
      value: "http://0.0.0.0:8080"
    - key: ASPNETCORE_HTTP_PORTS
      value: "8080"
    - key: ASPNETCORE_ENVIRONMENT
      value: "Production"
exposedPorts:
  - protocol: "HTTP"
    hostPort: "3002"
    containerPort: "8080"
    interface: "172.17.0.1"
ports:
  - protocol: "HTTPS"
    targetProtocol: "HTTP"
    listeningPort: "443"
    targetPort: "3002"
    targetIP: "172.17.0.1"
    public: true
    path: "/"
    isAuth: false
