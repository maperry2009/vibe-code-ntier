services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: namedemo
      POSTGRES_PASSWORD: namedemo
      POSTGRES_DB: namedemo
    ports:
      - "5432:5432"
    volumes:
      - namedemo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U namedemo -d namedemo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  namedemo_pgdata:
