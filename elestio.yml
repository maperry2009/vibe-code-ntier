config:
  runTime: ".NET"
  version: "8"
  installCommand: "dotnet restore src/NameDemo.Api/NameDemo.Api.csproj"
  buildCommand: "dotnet publish src/NameDemo.Api/NameDemo.Api.csproj -c Release -o ./publish-api"
  runCommand: "dotnet ./publish-api/NameDemo.Api.dll"
  buildDir: "./publish-api"
  env:
    - key: ASPNETCORE_URLS
      value: "http://0.0.0.0:8080"
    - key: ASPNETCORE_HTTP_PORTS
      value: "8080"
    - key: ASPNETCORE_ENVIRONMENT
      value: "Production"
exposedPorts:
  - protocol: "HTTP"
    hostPort: "8080"
    containerPort: "8080"
    interface: "172.17.0.1"
ports:
  - protocol: "HTTPS"
    targetProtocol: "HTTP"
    listeningPort: "443"
    targetPort: "8080"
    targetIP: "172.17.0.1"
    public: true
    path: "/"
    isAuth: false
